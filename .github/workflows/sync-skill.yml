name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/shelldon/SKILL.md
      - rules/shell-activate.md
      - skills/shelldon-compress/SKILL.md
      - skills/shelldon-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/shelldon/SKILL.md plugins/shelldon/skills/shelldon/SKILL.md

      - name: Sync compress skill to plugin
        run: |
          cp -r skills/shelldon-compress/scripts plugins/shelldon/skills/compress/scripts
          rm -rf plugins/shelldon/skills/compress/scripts/__pycache__

      - name: Rebuild shelldon.skill ZIP
        run: cd skills && zip -r ../shelldon.skill shelldon/

      - name: Sync auto-activation rules
        run: |
          BODY="rules/shell-activate.md"

          # Copilot — no frontmatter, direct copy
          mkdir -p .github
          cp "$BODY" .github/copilot-instructions.md

      - name: Commit and push if changed
        run: |
          git add \
            plugins/shelldon/ \
            shelldon.skill \
            .github/copilot-instructions.md
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync S.H.E.L.L. SKILL.md copies and auto-activation rules [skip ci]"
          git push
